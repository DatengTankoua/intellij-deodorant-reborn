stages:
  - build
  - test
  - release

build:
  stage: build
  image: gradle:8.5-jdk11
  script:
    - ./gradlew build
  except:
    - /^dev-.*$/
    - /^stable-.*$/

test:
  stage: test
  image: gradle:7.6-jdk11
  script:
    - ./gradlew test
  artifacts:
    reports:
      junit: build/test-results/test/*.xml

release:
  stage: release
  image: gradle:7.6-jdk11
  script:
    - chmod +x gradlew
    - ./gradlew buildPlugin
  artifacts:
    name: "IntelliJDeodorant-$CI_COMMIT_REF_NAME"
    paths:
      - build/distributions/*.zip
    expire_in: 6 mos
